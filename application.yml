eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
server:
# 0으로 셋팅하면 spring이 임의 port를 할당
  port: 0
spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-connection-factory:
      enabled: false
    listener:
      simple:
        missing-queues-fatal: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ordermsa?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: test123
  jpa:
    database: mysql
    #    InnoDB??
    database-platform: org.hibernate.dialect.MySQL8Dialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show_sql: true
  data:
    redis:
      port: 6379
      host: localhost
  cloud:
    bus:
      enabled: true